name: 使用自定义核心编译 ZerotierFix

# 触发方式
on:
  workflow_dispatch:    # 允许你手动触发
  push:
    branches: [ main ]  # 当你推送到 main 分支时触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. 检出 ZerotierFix 项目
    - name: 检出 ZerotierFix 源码
      uses: actions/checkout@v4
      with:
        # 关键：需要递归检出子模块，但后面我们会覆盖它
        submodules: 'recursive'
        # 注意：这里会先拉取 kaaass/ZerotierFix 配置的子模块

    # 2. 用你的核心替换子模块
    - name: 替换为自定义 ZeroTier 核心
      run: |
        # 进入子模块目录
        cd externals/core
        # 移除原有的远程仓库地址，添加你的仓库地址
        git remote set-url origin https://github.com/ligusx/ZeroTierOne1.14.2.git
        # 拉取你的仓库内容
        git fetch --all
        # 强制切换到你的主分支（或你想要的任意分支/标签）
        git checkout dev
        # 确保子模块指向你仓库的最新提交
        git pull origin dev
        # 返回项目根目录
        cd ../..
        # 暂存子模块的变更
        git add externals/core
        # 配置 Git 用户信息以便提交（如果后续需要提交）
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        # 提交变更（如果存在）
        git commit -m "chore: 切换核心到 ligusx/ZeroTierOne1.14.2" || echo "没有新的变更需要提交"

    # 3. 设置 Java 环境
    - name: 设置 JDK 11
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'

    # 4. 设置 Android SDK 环境
    - name: 设置 Android SDK
      uses: android-actions/setup-android@v3

    # 5. 执行编译
    - name: 编译 Debug APK
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug

    # 6. 上传 APK 作为构建产物
    - name: 上传 APK
      uses: actions/upload-artifact@v4
      with:
        name: zerotierfix-with-my-core
        path: app/build/outputs/apk/debug/*.apk

    # 7. (可选) 自动发布到 Releases
    - name: 创建发布并上传 APK
      if: startsWith(github.ref, 'refs/tags/') # 仅在打 tag 时触发
      uses: softprops/action-gh-release@v1
      with:
        files: app/build/outputs/apk/debug/*.apk
        tag_name: v${{ steps.version.outputs.version }}
        generate_release_notes: true
